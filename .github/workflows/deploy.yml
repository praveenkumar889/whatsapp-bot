name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -euo pipefail

            cd ~/whatsapp-bot

            echo "── Fetching latest code ──"
            git fetch origin main

            echo "── Force-syncing working tree to origin/main ──"
            # Using reset --hard instead of pull: a plain "git pull" refuses
            # to merge if any untracked file on the server happens to sit at
            # a path the incoming commit also touches (this is exactly what
            # silently broke our last 2 deploys — git pull failed, but the
            # script kept running and GitHub Actions still reported Success).
            # reset --hard forces the working tree to match origin/main exactly,
            # so this class of failure can't happen again. Any manual edits
            # made directly on the server will be discarded — EC2 should only
            # ever be updated via this pipeline from now on.
            git reset --hard origin/main

            echo "── Now at commit: $(git log -1 --oneline) ──"

            echo "── Installing dependencies ──"
            source .venv/bin/activate
            pip install -r requirements.txt

            echo "── Restarting service ──"
            sudo systemctl restart whatsapp-bot

            echo "── Verifying service is actually running ──"
            sleep 2
            if ! sudo systemctl is-active --quiet whatsapp-bot; then
              echo "ERROR: whatsapp-bot service failed to start after deploy"
              sudo systemctl status whatsapp-bot --no-pager
              exit 1
            fi

            echo "── Deploy successful ──"